name: "Update Tag"
description: "Update the provided tag in the GitHub repo"
author: "Richard Simko"
inputs:
  tag_name:
    description: "Name of the tag to create or update"
    required: true
  github_token:
    description: "Authorized secret GitHub Personal Access Token. Defaults to github.token"
    required: false
    default: ${{ github.token }}
  update_if_exists:
    description: "Whether to update the tag if it already exists"
    required: false
    default: "true"

runs:
  using: "node20"
  main: "dist/main.js"
branding:
  icon: "tag"
  color: "green"
